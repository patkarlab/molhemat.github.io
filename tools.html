<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Open-access research tools developed by the Molecular Hematology Research Group at ACTREC, Tata Memorial Centre." />
  <title>Tools — Molecular Hematology Research Group</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/site.css">
  <style>
    .tool .ic{font-size:30px}
    .tool h3{font-family:var(--font-head);font-size:19px;margin:12px 0 8px}
    .tool p{font-size:14.5px;color:var(--ink-soft);line-height:1.65;margin:0}
    .tool{display:flex;flex-direction:column;text-decoration:none;color:inherit}
    .tool .open{margin-top:16px;font-weight:650;font-size:14px;color:var(--red)}
    .linkrow{display:flex;align-items:flex-start;gap:14px;text-decoration:none;color:inherit;padding:18px 22px}
    .linkrow .arrow{font-size:18px;color:var(--red);margin-top:1px}
    .linkrow h4{font-family:var(--font-head);font-size:15.5px;margin:0 0 4px}
    .linkrow p{font-size:13.5px;color:var(--ink-soft);margin:0;line-height:1.55}
    .links-list{display:grid;gap:12px;margin-top:22px}
  </style>
</head>
<body>
  <div id="site-nav"></div>
  <canvas id="dna" aria-hidden="true"></canvas>

  <main class="container" role="main">
    <header style="text-align:center;margin-bottom:60px">
      <span class="eyebrow reveal">Built by our group</span>
      <h1 class="display reveal">Research <span class="grad-text">Tools</span></h1>
      <p class="lede reveal">Open-access tools developed by our group for genomics and clinical research.</p>
    </header>

    <div class="grid cols-3" id="tools-grid"><div class="empty-state">Loading tools…</div></div>

    <section class="section" id="links-section" hidden>
      <h2 class="section-head reveal">Useful <span class="grad-text">Links</span></h2>
      <div class="links-list" id="links-list"></div>
    </section>
  </main>

  <div id="site-footer"></div>
  <script src="assets/js/site.js"></script>
  <script src="assets/js/dna.js"></script>
  <script>
    (async () => {
      try {
        const data = await loadData("tools.json");
        document.getElementById("tools-grid").innerHTML = (data.tools || []).map(t => `
          <a class="card tool reveal" href="${esc(t.link)}">
            <div class="ic">${esc(t.icon || "🧰")}</div>
            <h3>${esc(t.title)}</h3>
            <p>${esc(t.description)}</p>
            ${(t.tags && t.tags.length) ? `<div class="chips">${t.tags.map(x => `<span class="chip">${esc(x)}</span>`).join("")}</div>` : ""}
            <span class="open">Open tool →</span>
          </a>`).join("");
        const links = data.links || [];
        if (links.length) {
          document.getElementById("links-list").innerHTML = links.map(l => `
            <a class="card linkrow reveal" href="${esc(l.url)}" target="_blank" rel="noopener">
              <span class="arrow">↗</span>
              <span><h4>${esc(l.title)}</h4>${l.description ? `<p>${esc(l.description)}</p>` : ""}</span>
            </a>`).join("");
          document.getElementById("links-section").hidden = false;
        }
        observeReveals();
      } catch (e) {
        document.getElementById("tools-grid").innerHTML = `<div class="empty-state">Could not load tools.</div>`;
        console.error(e);
      }
    })();
  </script>
</body>
</html>
