<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Publications of the Molecular Hematology Research Group at ACTREC, Tata Memorial Centre, Mumbai, India." />
  <title>Publications — Molecular Hematology Research Group</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/site.css">
</head>
<body>
  <div id="site-nav"></div>
  <canvas id="dna" aria-hidden="true"></canvas>

  <main class="container" role="main">
    <header style="text-align:center;margin-bottom:60px">
      <span class="eyebrow reveal">Selected work</span>
      <h1 class="display reveal">Our <span class="grad-text">Publications</span></h1>
      <p class="lede reveal">Highlighted papers and invited reviews. A complete, updated list is on
        <a class="inline" href="https://pubmed.ncbi.nlm.nih.gov/?term=Patkar+Nikhil&sort=date" target="_blank" rel="noopener">PubMed</a>.</p>
    </header>
    <div id="pubs-root"><div class="empty-state">Loading publications…</div></div>
  </main>

  <div id="site-footer"></div>
  <script src="assets/js/site.js"></script>
  <script src="assets/js/dna.js"></script>
  <script>
    (async () => {
      const root = document.getElementById("pubs-root");
      try {
        const data = await loadData("publications.json");
        root.innerHTML = data.sections.map(sec => `
          <section class="section" style="margin-top:0;margin-bottom:60px">
            <h2 class="section-head reveal">${esc(sec.title)}</h2>
            <div class="grid cols-3" style="margin-top:22px">
              ${sec.items.map(p => `
                <a class="card pub reveal" href="${esc(p.link)}" target="_blank" rel="noopener">
                  <div class="thumb"><img src="${esc(p.image)}" alt="${esc(p.caption)}" loading="lazy"></div>
                  <div class="meta">
                    ${p.year ? `<p class="yr">${esc(p.year)}</p>` : ""}
                    <p class="cap">${esc(p.caption)}</p>
                  </div>
                </a>`).join("")}
            </div>
          </section>`).join("");
        observeReveals();
      } catch (e) {
        root.innerHTML = `<div class="empty-state">Could not load publications. Please try again later.</div>`;
        console.error(e);
      }
    })();
  </script>
</body>
</html>
