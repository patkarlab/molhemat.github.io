<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Team members of the Molecular Hematology Research Group at ACTREC, Tata Memorial Centre, Mumbai, India." />
  <title>Team — Molecular Hematology Research Group</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/site.css">
  <style>
    .cv-btn{
      display:inline-block;margin-top:12px;padding:8px 18px;border-radius:999px;
      background:var(--navy);color:#fff;text-decoration:none;font-size:13px;font-weight:600;
      transition:background .25s ease,transform .25s ease;
    }
    .cv-btn:hover{background:var(--red);transform:scale(1.05)}
    .team-section{margin-top:54px}
    .team-section:first-of-type{margin-top:0}
  </style>
</head>
<body>
  <div id="site-nav"></div>
  <canvas id="dna" aria-hidden="true"></canvas>

  <main class="container" role="main">
    <header style="text-align:center;margin-bottom:60px">
      <span class="eyebrow reveal">The people behind the science</span>
      <h1 class="display reveal">Our <span class="grad-text">Team</span></h1>
      <p class="lede reveal">Clinicians, scientists, bioinformaticians and coordinators working together on blood cancer genomics.</p>
    </header>
    <div id="team-root"><div class="empty-state">Loading team…</div></div>
  </main>

  <div id="site-footer"></div>
  <script src="assets/js/site.js"></script>
  <script src="assets/js/dna.js"></script>
  <script>
    (async () => {
      const root = document.getElementById("team-root");
      try {
        const data = await loadData("team.json");
        root.innerHTML = data.sections.map(sec => `
          <section class="team-section">
            <h2 class="section-head reveal">${esc(sec.title)}</h2>
            <div class="grid cols-4" style="margin-top:20px">
              ${sec.members.map(m => `
                <div class="card member reveal${m.featured ? " featured" : ""}">
                  <img src="${esc(m.photo)}" alt="${esc(m.name)}" loading="lazy"
                       onerror="this.src='https://via.placeholder.com/140/0a1e78/ffffff?text=${encodeURIComponent(esc(m.name).split(" ").map(w=>w[0]).join("").slice(0,2))}'">
                  <h3>${esc(m.name)}</h3>
                  ${m.credentials ? `<p class="creds">${esc(m.credentials)}</p>` : ""}
                  ${m.role ? `<p>${esc(m.role)}</p>` : ""}
                  ${m.cv ? `<a class="cv-btn" href="${esc(m.cv)}" target="_blank" rel="noopener">View CV</a>` : ""}
                </div>`).join("")}
            </div>
          </section>`).join("");
        observeReveals();
      } catch (e) {
        root.innerHTML = `<div class="empty-state">Could not load the team list. Please try again later.</div>`;
        console.error(e);
      }
    })();
  </script>
</body>
</html>
